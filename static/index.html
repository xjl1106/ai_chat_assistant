<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>AI Chat Assistant</title>
    <style>
        body {
            font-family: Arial, "Microsoft YaHei", sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 700px;
            margin: 60px auto;
            background-color: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 0 12px rgba(0, 0, 0, 0.08);
        }

        h1 {
            text-align: center;
            margin-bottom: 24px;
        }

        #chat-box {
            height: 400px;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 16px;
            overflow-y: auto;
            background-color: #fafafa;
            margin-bottom: 16px;
        }

        .message {
            margin-bottom: 12px;
            line-height: 1.6;
        }

        .user {
            color: #1a73e8;
            font-weight: bold;
        }

        .ai {
            color: #188038;
            font-weight: bold;
        }

        .input-area {
            display: flex;
            gap: 8px;
        }

        #message-input {
            flex: 1;
            padding: 10px;
            font-size: 16px;
        }

        #send-btn， #clear-btn {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }


        .loading {
            color: #999;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>AI Chat Assistant</h1>

        <div id="chat-box"></div>

        <div class="input-area">
            <input id="message-input" type="text" placeholder="请输入你的问题">
            <button id="send-btn">发送</button>
            <button id="clear-btn">清空对话</button>
        </div>
    </div>

    <script>


        const chatBox = document.getElementById("chat-box");
        const input = document.getElementById("message-input");
        const sendBtn = document.getElementById("send-btn");
        const clearBtn = document.getElementById("clear-btn");

        function getSessionId() {
            let sessionId = localStorage.getItem("session_id");

            if (!sessionId) {
                sessionId = crypto.randomUUID();
                localStorage.setItem("session_id", sessionId);
            }
            return sessionId;
        }

        const sessionId = getSessionId();

        function addMessage(role, content) {
            const div = document.createElement("div");
            div.className = "message";

            if (role === "user") {
                div.innerHTML = `<span class="user">你：</span>${content}`;
            } else if (role === "ai") {
                div.innerHTML = `<span class="ai">AI：</span>${content}`;
            } else {
                div.innerHTML = `<span class="loading">${content}</span>`;
            }

            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;

            return div;
        }

        async function sendMessage() {
            const message = input.value.trim();

            if (!message) {
                alert("请输入内容");
                return;
            }

            addMessage("user", message);
            input.value = "";

            const aiDiv = addMessage("ai", "");
            let aiText = "";

            try {
                const response = await fetch("/chat/stream", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        message: message,
                        session_id: sessionId
                    })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    aiDiv.innerHTML = `<span class="ai">AI：</span>请求失败：${errorText}`;
                    return;
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");

                let buffer = "";

                while (true) {
                    const { value, done } = await reader.read();

                    if (done) {
                        break;
                    }

                    buffer += decoder.decode(value, { stream: true });

                    const events = buffer.split("\n\n");
                    buffer = events.pop();

                    for (const event of events) {
                        const lines = event.split("\n");

                        for (const line of lines) {
                            if (line.startsWith("data: ")) {
                                const jsonStr = line.replace("data: ", "").trim();

                                if (!jsonStr || jsonStr === "{}") {
                                    continue;
                                }

                                try {
                                    const data = JSON.parse(jsonStr);
                                    aiText += data.content || "";

                                    aiDiv.innerHTML = `<span class="ai">AI：</span>${aiText}`;
                                    chatBox.scrollTop = chatBox.scrollHeight;
                                } catch (e) {
                                    console.error("SSE 解析失败：", jsonStr, e);
                                }
                            }
                        }
                    }
                }

            } catch (error) {
                aiDiv.innerHTML = `<span class="ai">AI：</span>请求失败，请检查后端服务是否正常运行。`;
                console.error(error);
            }
        }
        async function clearChat() {
            const confirmed = confirm("确定要清空当前会话历史吗？");
            if (!confirmed) {
                return;
            }

            try {
                const response = await fetch("/clear", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        session_id: sessionId
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    alert("清空会话失败：" + (data.detail || "未知错误"));
                    return;
                }

                chatBox.innerHTML = "";
                alert("会话已清空。");

            } catch (error) {
                alert("网络错误，请检查后端服务是否正常运行。");
                console.error(error);
            }



        }

        sendBtn.addEventListener("click", sendMessage);
        clearBtn.addEventListener("click", clearChat);

        input.addEventListener("keydown", function (event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        });
    </script>
</body>

</html>
